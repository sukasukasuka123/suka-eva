syntax = "proto3";
package tool.v1;

option go_package = "suka-eva/agent/base/core/pb;pb";

// 微服务工具通用接口
service MicroToolService {
  // 执行工具
  rpc Execute(ToolRequest) returns (ToolResponse);
  // 获取工具Schema（用于LLM function calling）
  rpc GetSchema(SchemaRequest) returns (SchemaResponse);
  // 健康检查
  rpc Health(HealthRequest) returns (HealthResponse);
}

message ToolRequest {
  string tool_name = 1;
  map<string, string> params = 2;  // 字符串参数，复杂类型用JSON string
  string request_id = 3;
  string session_id = 4;
}

message ToolResponse {
  bool success = 1;
  string data = 2;          // JSON encoded result
  string error = 3;
  string request_id = 4;
  int64 latency_ms = 5;
}

message SchemaRequest {
  string tool_name = 1;
}

message SchemaResponse {
  string json_schema = 1;   // JSON Schema string
}

message HealthRequest {}
message HealthResponse {
  bool serving = 1;
  string version = 2;
}